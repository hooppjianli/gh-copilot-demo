# GitHub Action workflow that runs on push to main branch
name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'
      - run: npm install
      - run: npm test
      - run: npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: "Automated release for commit ${{ github.sha }}"
          draft: false
          prerelease: false 
          
# Docker build and push the album-api image to ACR
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/album-api:${{ github.run_number }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/album-api:${{ github.run_number }}

# tag the image with the GitHub run id and push to docker hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/album-api:${{ github.run_number }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/album-api:${{ github.run_number }}

# run tests on the album-api image
      - name: Run tests on Docker image
        run: |
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/album-api:${{ github.run_number }} npm test

# deploy the album-api image to the dev AKS cluster
      - name: Deploy to AKS
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/album-api album-api=${{ secrets.DOCKER_USERNAME }}/album-api:${{ github.run_number }} --record
          kubectl rollout status deployment/album-api

# find and replace the %%VERSION%% by the GitHub action run id in every appmanifest.yml file
      - name: Update appmanifest.yml files
        run: |
          find . -name "appmanifest.yml" -exec sed -i "s/%%VERSION%%/${{ github.run_number }}/g" {} \;
          find . -name "appmanifest.yml" -exec cat {} \;  
          
